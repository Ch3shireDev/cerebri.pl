<!DOCTYPE html>
<html lang="pl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <script>
        (function () {
            const media = window.matchMedia('(prefers-color-scheme: dark)');
            const applyTheme = (isDark) => document.documentElement.setAttribute('data-bs-theme', isDark ? 'dark' : 'light');
            applyTheme(media.matches);
            media.addEventListener('change', (e) => applyTheme(e.matches));
        })();
    </script>
    <title>Test: Ochrona Przyrody w Polsce - Cerebri.pl</title>
    
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;700;800&display=swap" rel="stylesheet">
</head>
<body>

    <div id="quiz-container">
        <p class="text-center mt-5">Ładowanie mechanizmu quizu...</p>
    </div>

    <script>
        window.quizConfig = {
            backRoute: 'biology',
            backTitle: 'Biologia',
            backUrl: '#!/biology',
            backIndex: 'biology/index.html',
            correctFeedback: "✅ Poprawnie!",
            wrongFeedback: "❌ Błąd!"
        };

        window.quizResults = {
            perfect: {
                emoji: "🦅",
                title: "Strażnik Przyrody!",
                suggestion: "Bezbłędny wynik. Znasz polską przyrodę i formy jej ochrony na wylot."
            },
            great: {
                emoji: "🌲",
                title: "Świetny wynik!",
                suggestion: "Posiadasz bardzo rozległą wiedzę o parkach narodowych i gatunkach chronionych."
            },
            good: {
                emoji: "🌿",
                title: "Dobry wynik!",
                suggestion: "Znasz podstawy, ale warto powtórzyć informacje o specyficznych rezerwatach i gatunkach."
            },
            poor: {
                emoji: "🍂",
                title: "Wymaga powtórki",
                suggestion: "Ochrona przyrody to ważny temat. Przejrzyj wyjaśnienia i spróbuj ponownie."
            }
        };

        window.questions = [
            {
                q: "Ile parków narodowych znajduje się obecnie w Polsce?",
                options: ["16", "23", "28", "32"],
                correct: 1,
                explanation: "W Polsce utworzono 23 parki narodowe. Najmłodszy z nich to powołany w 2001 roku Park Narodowy Ujście Warty."
            },
            {
                q: "Najstarszym parkiem narodowym w Polsce jest:",
                options: ["Tatrzański Park Narodowy", "Pieniński Park Narodowy", "Białowieski Park Narodowy", "Ojcowski Park Narodowy"],
                correct: 2,
                explanation: "Białowieski Park Narodowy został utworzony w 1932 roku, co czyni go najstarszym w Polsce."
            },
            {
                q: "Który park narodowy jest największy pod względem powierzchni?",
                options: ["Biebrzański Park Narodowy", "Kampinoski Park Narodowy", "Tatrzański Park Narodowy", "Bieszczadzki Park Narodowy"],
                correct: 0,
                explanation: "Biebrzański Park Narodowy zajmuje powierzchnię ponad 59 tys. hektarów i chroni rozległe tereny bagienne."
            },
            {
                q: "Co jest symbolem Białowieskiego Parku Narodowego?",
                options: ["Bóbr", "Żubr", "Ryś", "Łoś"],
                correct: 1,
                explanation: "Symbol to żubr. Białowieski PN odegrał kluczową rolę w restytucji (przywróceniu do natury) tego gatunku po tym, jak wyginął on na wolności."
            },
            {
                q: "Który park narodowy słynie z ruchomych wydm?",
                options: ["Woliński Park Narodowy", "Słowiński Park Narodowy", "Park Narodowy Bory Tucholskie", "Wigierski Park Narodowy"],
                correct: 1,
                explanation: "Słowiński Park Narodowy na wybrzeżu Bałtyku chroni m.in. unikalne, wędrujące wydmy."
            },
            {
                q: "Jaki jest główny cel tworzenia rezerwatów ścisłych?",
                options: ["Ochrona przyrody przy całkowitym zaniechaniu ingerencji człowieka", "Zapewnienie terenów łowieckich", "Rozwój turystyki masowej", "Ochrona krajobrazu dla rolnictwa"],
                correct: 0,
                explanation: "W rezerwacie ścisłym przyroda pozostawiona jest samej sobie. Zabroniona jest jakakolwiek ingerencja człowieka (np. wycinka drzew)."
            },
            {
                q: "Najmniejszy park narodowy w Polsce to:",
                options: ["Pieniński Park Narodowy", "Gorczański Park Narodowy", "Ojcowski Park Narodowy", "Karkonoski Park Narodowy"],
                correct: 2,
                explanation: "Ojcowski Park Narodowy ma powierzchnię zaledwie około 21 km kwadratowych, chroniąc Dolinę Prądnika."
            },
            {
                q: "Otulina to:",
                options: ["Gatunek grzyba chronionego", "Strefa ochronna wokół parku narodowego lub rezerwatu", "Urządzenie do karmienia zwierząt", "Obszar całkowicie zamknięty dla turystów"],
                correct: 1,
                explanation: "Otulina to wyznaczona strefa wokół obszaru chronionego, która ma go zabezpieczać przed szkodliwym wpływem czynników zewnętrznych (np. przemysłu)."
            },
            {
                q: "Czerwona Księga to:",
                options: ["Rejestr drzew przeznaczonych do wycinki", "Wykaz roślin i zwierząt zagrożonych wyginięciem", "Zbiór przepisów dla myśliwych", "Spis wszystkich parków w Europie"],
                correct: 1,
                explanation: "Polska Czerwona Księga Zwierząt oraz Polska Czerwona Księga Roślin to rejestry gatunków zagrożonych wymarciem na terenie kraju."
            },
            {
                q: "Co chroni program Natura 2000?",
                options: ["Tylko zabytki architektury drewnianej", "Typy siedlisk przyrodniczych oraz gatunki ważne w skali całej Europy", "Wyłącznie rezerwaty ścisłe", "Parki miejskie założone przed 2000 rokiem"],
                correct: 1,
                explanation: "Natura 2000 to europejska sieć ekologiczna mająca na celu zachowanie określonych typów siedlisk i gatunków ważnych dla różnorodności biologicznej UE."
            },
            {
                q: "Dąb Bartek to przykład formy ochrony przyrody nazywanej:",
                options: ["Pomnikiem przyrody", "Użytkiem ekologicznym", "Stanowiskiem dokumentacyjnym", "Zespołem przyrodniczo-krajobrazowym"],
                correct: 0,
                explanation: "Pomnikami przyrody najczęściej są pojedyncze, okazałe drzewa, głazy narzutowe, jaskinie czy źródła o szczególnej wartości."
            },
            {
                q: "Gatunek endemiczny to taki, który:",
                options: ["Występuje powszechnie na całym świecie", "Występuje tylko na jednym, ograniczonym obszarze i nigdzie indziej", "Został sztucznie sprowadzony do danego kraju", "Jest szkodnikiem upraw"],
                correct: 1,
                explanation: "Endemit to gatunek unikalny dla danego miejsca. W Polsce przykładem jest m.in. warzucha polska występująca na Pustyni Błędowskiej."
            },
            {
                q: "Który gatunek ssaka nie jest objęty w Polsce ochroną ścisłą (wymaga zgody na odstrzał w wyjątkowych sytuacjach, ale bywa redukowany)?",
                options: ["Dzik", "Niedźwiedź brunatny", "Wilk", "Ryś"],
                correct: 0,
                explanation: "Dzik jest zwierzęciem łownym, nie podlega ochronie gatunkowej. Niedźwiedź, wilk i ryś są pod ochroną ścisłą."
            },
            {
                q: "Symbolem Tatrzańskiego Parku Narodowego jest:",
                options: ["Niedźwiedź", "Świstak", "Kozica", "Orzeł przedni"],
                correct: 2,
                explanation: "W herbie TPN widnieje kozica tatrzańska na tle górskich szczytów."
            },
            {
                q: "Parki krajobrazowe różnią się od parków narodowych głównie tym, że:",
                options: ["Są mniejsze", "Obejmują tylko tereny leśne", "Dopuszcza się w nich działalność rolniczą i gospodarczą, o ile nie niszczy to przyrody", "Zakazuje się w nich turystyki"],
                correct: 2,
                explanation: "Park krajobrazowy to forma ochrony o niższym rygorze. Ludzie mogą w nich mieszkać i prowadzić działalność, o ile współgra to z ochroną krajobrazu."
            },
            {
                q: "Gołoborza to charakterystyczne rumowiska skalne chronione w:",
                options: ["Świętokrzyskim Parku Narodowym", "Tatrzańskim Parku Narodowym", "Pienińskim Parku Narodowym", "Roztoczańskim Parku Narodowym"],
                correct: 0,
                explanation: "Świętokrzyski PN słynie z gołoborzy (nagich pól skalnych na zboczach gór) oraz lasów jodłowych."
            },
            {
                q: "Ochrona czynna polega na:",
                options: ["Zostawieniu przyrody samej sobie", "Stosowaniu zabiegów ochronnych, np. wykaszaniu łąk, by zapobiec ich zarośnięciu", "Zabijaniu wszystkich drapieżników", "Ogrodzeniu terenu murem"],
                correct: 1,
                explanation: "W przeciwieństwie do ochrony biernej (ścisłej), ochrona czynna to aktywne działania człowieka niezbędne do utrzymania danego ekosystemu w pożądanym stanie."
            },
            {
                q: "Mikołajek nadmorski, roślina rosnąca na wydmach Bałtyku:",
                options: ["Jest chwastem zwalczanym chemicznie", "Jest gatunkiem łownym", "Znajduje się pod ścisłą ochroną gatunkową", "Można go swobodnie zrywać do bukietów"],
                correct: 2,
                explanation: "Ze względu na niszczenie siedlisk i masowe zrywanie w przeszłości, mikołajek nadmorski objęty jest w Polsce ochroną gatunkową."
            },
            {
                q: "Który park narodowy chroni unikalny krajobraz wapiennych ostańców (m.in. Maczugę Herkulesa)?",
                options: ["Ojcowski Park Narodowy", "Pieniński Park Narodowy", "Tatrzański Park Narodowy", "Gór Stołowych Park Narodowy"],
                correct: 0,
                explanation: "Ojcowski PN obejmuje Dolinę Prądnika z charakterystycznymi wapiennymi formacjami skalnymi, takimi jak Maczuga Herkulesa czy Brama Krakowska."
            },
            {
                q: "Relikt to gatunek, który:",
                options: ["Pojawił się w środowisku na skutek mutacji w ostatnim wieku", "Przetrwał na danym terenie z dawnych epok geologicznych, a jego główny zasięg jest obecnie inny", "Został przywieziony z innego kontynentu", "Nie występuje w przyrodzie, istnieje tylko w laboratoriach"],
                correct: 1,
                explanation: "Przykładem reliktu epoki lodowcowej w Polsce jest np. dębik ośmiopłatkowy lub wierzba zielna w Tatrach."
            }
        ];

        fetch('../templates/quiz.html')
            .then(response => response.text())
            .then(html => {
                const parser = new DOMParser();
                const doc = parser.parseFromString(html, 'text/html');
                
                doc.querySelectorAll('style').forEach(s => document.head.appendChild(s));
                
                const container = document.getElementById('quiz-container');
                container.innerHTML = doc.body.innerHTML;
                
                doc.querySelectorAll('script').forEach(oldScript => {
                    const newScript = document.createElement('script');
                    newScript.textContent = oldScript.textContent;
                    document.body.appendChild(newScript);
                });
            })
            .catch(err => {
                document.getElementById('quiz-container').innerHTML = `<p class="text-danger text-center">Błąd ładowania quizu. Upewnij się, że używasz serwera HTTP.</p>`;
            });
    </script>
</body>
</html>
