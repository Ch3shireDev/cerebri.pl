<!DOCTYPE html>
<html lang="pl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <script>
        (function () {
            const media = window.matchMedia('(prefers-color-scheme: dark)');
            const applyTheme = (isDark) => document.documentElement.setAttribute('data-bs-theme', isDark ? 'dark' : 'light');
            applyTheme(media.matches);
            media.addEventListener('change', (e) => applyTheme(e.matches));
        })();
    </script>
    <title>Biologia - Cerebri.pl</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;700;800&display=swap" rel="stylesheet">

    <style>
        :root {
            --bg-primary: #f4fbf7;
            --bg-secondary: #ffffff;
            --text-primary: #2c3e50;
            --text-secondary: #666666;
            --accent-color: #10ac84;
            --accent-hover: #0d8a6a;
            --card-border: rgba(0,0,0,0.1);
        }

        [data-bs-theme="dark"] {
            --bg-primary: #111814;
            --bg-secondary: #1e293b;
            --text-primary: #e2e8f0;
            --text-secondary: #b0b0b0;
            --accent-color: #10ac84;
            --accent-hover: #0d8a6a;
            --card-border: rgba(255,255,255,0.1);
        }

        body {
            font-family: 'Nunito', sans-serif;
            background-color: var(--bg-primary);
            color: var(--text-primary);
            padding: 15px;
            transition: background-color 0.3s ease, color 0.3s ease;
        }

        .topic-card {
            border: 1px solid var(--card-border);
            border-radius: 15px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.05);
            border-left: 6px solid var(--accent-color);
            background-color: var(--bg-secondary);
            color: var(--text-primary);
        }

        .topic-btn {
            background-color: var(--accent-color);
            color: white;
            border-radius: 25px;
            font-weight: 700;
            padding: 6px 16px;
            border: none;
            width: 100%;
            font-size: 0.9rem;
        }

        .topic-btn:hover {
            background-color: var(--accent-hover);
        }
    </style>
</head>
<body>
    <div class="container mx-auto" style="max-width: 600px; padding-bottom: 40px;">
        <div class="text-center py-4">
            <h1 class="fw-bold" style="color: var(--accent-color);">Biologia</h1>
            <p class="text-body-secondary mb-4">Wybierz dział, aby rozpocząć test.</p>
        </div>

        <div class="card topic-card mb-2">
            <div class="card-body p-3">
                <h4 class="fw-bold mb-1" style="font-size: 1.1rem;">Podstawy Biologii</h4>
                <p class="text-body-secondary mb-2" style="font-size: 0.85rem;">Przejdź do quizu o podstawach biologii.</p>
                <button class="topic-btn" data-route="biology/basics" data-src="biology/basics.html">Otwórz</button>
            </div>
        </div>

        <div class="card topic-card mb-2">
            <div class="card-body p-3">
                <h4 class="fw-bold mb-1" style="font-size: 1.1rem;">Ekologia</h4>
                <p class="text-body-secondary mb-2" style="font-size: 0.85rem;">Przejdź do quizu z ekologii.</p>
                <button class="topic-btn" data-route="biology/ecology" data-src="biology/ecology.html">Otwórz</button>
            </div>
        </div>

        <div class="card topic-card mb-2">
            <div class="card-body p-3">
                <h4 class="fw-bold mb-1" style="font-size: 1.1rem;">Ochrona Przyrody w Polsce</h4>
                <p class="text-body-secondary mb-2" style="font-size: 0.85rem;">Przejdź do quizu o ochronie przyrody w Polsce.</p>
                <button class="topic-btn" data-route="biology/nature-conservation" data-src="biology/nature-conservation.html">Otwórz</button>
            </div>
        </div>

        <div class="card topic-card mb-2">
            <div class="card-body p-3">
                <h4 class="fw-bold mb-1" style="font-size: 1.1rem;">Ciało Człowieka</h4>
                <p class="text-body-secondary mb-2" style="font-size: 0.85rem;">Przejdź do quizu o ciele człowieka.</p>
                <button class="topic-btn" data-route="biology/human-body" data-src="biology/human-body.html" disabled style="opacity: 0.6; cursor: not-allowed;">Wkrótce</button>
            </div>
        </div>
    </div>

    <script>
        function navigateTo(route, src) {
            const isEmbedded = window.parent && window.parent !== window;
            const parentFrame = isEmbedded ? window.parent.document.getElementById('content-frame') : null;

            if (parentFrame) {
                window.parent.history.pushState({ route }, '', `#!/${route}`);
                parentFrame.src = src;
                return;
            }

            window.location.href = src.split('/').pop();
        }

        document.querySelectorAll('.topic-btn:not(:disabled)').forEach((button) => {
            button.addEventListener('click', () => {
                const route = button.getAttribute('data-route');
                const src = button.getAttribute('data-src');
                navigateTo(route, src);
            });
        });
    </script>
</body>
</html>
