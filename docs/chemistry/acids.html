<!DOCTYPE html>
<html lang="pl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <script>
        (function () {
            const media = window.matchMedia('(prefers-color-scheme: dark)');
            const applyTheme = (isDark) => document.documentElement.setAttribute('data-bs-theme', isDark ? 'dark' : 'light');
            applyTheme(media.matches);
            media.addEventListener('change', (e) => applyTheme(e.matches));
        })();
    </script>
    <title>Test: Kwasy Tlenowe i Beztlenowe - Cerebri.pl</title>
    
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;700;800&display=swap" rel="stylesheet">

    <script>
        window.MathJax = {
            tex: { inlineMath: [['\\(', '\\)']] }
        };
    </script>
    <script id="MathJax-script" async src="https://cdn.jsdelivr.net/npm/mathjax@3/es5/tex-mml-chtml.js"></script>
</head>
<body>

    <div id="quiz-container">
        <p class="text-center mt-5">Ładowanie mechanizmu quizu...</p>
    </div>

    <script>
        window.quizConfig = {
            backRoute: 'chemistry',
            backTitle: 'Chemia',
            backUrl: '#!/chemistry',
            backIndex: 'chemistry/index.html',
            correctFeedback: "✅ Świetnie!",
            wrongFeedback: "❌ No nie bardzo..."
        };

        window.quizResults = {
            perfect: {
                emoji: "👑",
                title: "Król Kwasów!",
                suggestion: "Twoja wiedza jest kompletna. Beztlenowe czy tlenowe – nic Cię nie zaskoczy!"
            },
            great: {
                emoji: "🧪",
                title: "Wybitny chemik!",
                suggestion: "Opanowałeś niemal wszystko! Spróbuj jeszcze raz po 'platynę' (100%)."
            },
            good: {
                emoji: "🥈",
                title: "Dobra robota!",
                suggestion: "Masz solidną wiedzę, ale zdarzają się pomyłki w nazewnictwie lub wzorach. Powtórz materiał i popraw wynik!"
            },
            poor: {
                emoji: "🧪",
                title: "Wymagana powtórka",
                suggestion: "Nie poddawaj się! Przeanalizuj wyjaśnienia pod błędnymi odpowiedziami i spróbuj uzyskać lepszy wynik."
            }
        };

        window.questions = [
            // BEZTLENOWE
            {
                q: "Wzór sumaryczny kwasu chlorowodorowego to:",
                options: ["\\(HCl\\)", "\\(HClO\\)", "\\(H_2S\\)", "\\(HClO_4\\)"],
                correct: 0,
                explanation: "Kwas chlorowodorowy (solny) to wodny roztwór gazowego chlorowodoru (\\(HCl\\)). Jest kwasem beztlenowym."
            },
            {
                q: "Który kwas ma zapach zgniłych jaj?",
                options: ["Kwas solny", "Kwas bromowodorowy", "Kwas siarkowodorowy", "Kwas cyjanowodorowy"],
                correct: 2,
                explanation: "Kwas siarkowodorowy (\\(H_2S\\)) powstaje przez rozpuszczenie siarkowodoru w wodzie, który charakteryzuje się tym nieprzyjemnym zapachem."
            },
            {
                q: "Kwas fluorowodorowy (\\(HF\\)) przechowuje się w butelkach plastikowych, ponieważ:",
                options: ["Jest bardzo tani", "Trawi szkło", "Reaguje z plastikiem", "Jest bardzo lotny"],
                correct: 1,
                explanation: "\\(HF\\) jako jedyny kwas reaguje z krzemionką (\\(SiO_2\\)) zawartą w szkle, co powoduje jego 'trawienie'."
            },
            {
                q: "Wzór sumaryczny kwasu cyjanowodorowego to:",
                options: ["\\(HCN\\)", "\\(HCNO\\)", "\\(H_2CN\\)", "\\(CNH\\)"],
                correct: 0,
                explanation: "\\(HCN\\) to silnie trujący kwas beztlenowy, pachnący gorzkimi migdałami."
            },
            {
                q: "Sole kwasu jodowodorowego (\\(HI\\)) nazywamy:",
                options: ["Jodanami", "Jodkami", "Jodarkami", "Jodami"],
                correct: 1,
                explanation: "Sole kwasów beztlenowych mają końcówkę '-ek'. Dlatego dla kwasu jodowodorowego są to jodki."
            },
            
            // TLENOWE
            {
                q: "Wzór kwasu siarkowego(VI) to:",
                options: ["\\(H_2SO_3\\)", "\\(H_2S\\)", "\\(H_2SO_4\\)", "\\(H_2SO_2\\)"],
                correct: 2,
                explanation: "Kwas siarkowy(VI) to \\(H_2SO_4\\). Liczba rzymska (VI) oznacza wartościowość siarki w tym kwasie."
            },
            {
                q: "Który kwas barwi białko na żółto (reakcja ksantoproteinowa)?",
                options: ["\\(H_2SO_4\\)", "\\(H_3PO_4\\)", "\\(HNO_3\\)", "\\(H_2CO_3\\)"],
                correct: 2,
                explanation: "Kwas azotowy(V) (\\(HNO_3\\)) reaguje z białkami, co wykorzystuje się do ich wykrywania."
            },
            {
                q: "Złota zasada rozcieńczania kwasu siarkowego(VI) to:",
                options: ["Wlewaj wodę do kwasu", "Wlewaj kwas do wody", "Mieszaj bez użycia wody", "Nie wolno ich mieszać"],
                correct: 1,
                explanation: "Zawsze wlewamy kwas do wody, ponieważ reakcja jest silnie egzotermiczna i wlewanie wody do kwasu grozi pryskaniem żrącej cieczy."
            },
            {
                q: "Kwas węglowy (\\(H_2CO_3\\)) jest kwasem:",
                options: ["Bardzo silnym", "Trwałym", "Nietrwałym", "Stałym"],
                correct: 2,
                explanation: "Kwas węglowy łatwo rozkłada się na wodę i tlenek węgla(IV), co widzimy jako bąbelki w wodzie gazowanej."
            },
            {
                q: "Który kwas tlenowy jest składnikiem napojów typu Cola?",
                options: ["Kwas siarkowy(VI)", "Kwas azotowy(V)", "Kwas fosforowy(V)", "Kwas krzemowy"],
                correct: 2,
                explanation: "Kwas fosforowy(V) (\\(H_3PO_4\\)) pełni rolę regulatora kwasowości w wielu produktach spożywczych."
            },

            // PORÓWNANIE I SYNTEZA
            {
                q: "Jaka jest główna różnica w nazewnictwie soli kwasów tlenowych i beztlenowych?",
                options: ["Tlenowe mają końcówkę -ek, beztlenowe -an", "Tlenowe mają końcówkę -an, beztlenowe -ek", "Nie ma żadnej różnicy", "Beztlenowe zawsze kończą się na -owy"],
                correct: 1,
                explanation: "Siarczek (beztlenowy) vs Siarczan (tlenowy). To podstawowa zasada nomenklatury soli."
            },
            {
                q: "Wartościowość reszty kwasowej w kwasie siarkowym(IV) (\\(H_2SO_3\\)) wynosi:",
                options: ["I", "II", "IV", "VI"],
                correct: 1,
                explanation: "Reszta kwasowa ma taką wartościowość, ile atomów wodoru znajduje się w cząsteczce kwasu. Tutaj są 2 wodory, więc II."
            },
            {
                q: "Który z poniższych kwasów jest kwasem beztlenowym?",
                options: ["\\(H_2SiO_3\\)", "\\(HBr\\)", "\\(H_3PO_4\\)", "\\(HClO_3\\)"],
                correct: 1,
                explanation: "Kwas bromowodorowy (\\(HBr\\)) nie posiada w swojej cząsteczce atomu tlenu."
            },
            {
                q: "Jak powstają kwasy beztlenowe?",
                options: ["Tlenek niemetalu + woda", "Rozpuszczenie wodorku niemetalu w wodzie", "Reakcja metalu z tlenem", "Reakcja tlenku metalu z wodą"],
                correct: 1,
                explanation: "Kwasy beztlenowe otrzymujemy rozpuszczając gazowe wodorki (np. \\(HCl, H_2S\\)) w wodzie. Kwasy tlenowe powstają z tlenków kwasowych."
            },
            {
                q: "Kwas krzemowy (\\(H_2SiO_3\\)) wyróżnia się tym, że:",
                options: ["Jest silnie żrący", "Pachnie migdałami", "Jest trudno rozpuszczalny (tworzy żel)", "Jest najsilniejszym kwasem"],
                correct: 2,
                explanation: "Większość kwasów nieorganicznych dobrze rozpuszcza się w wodzie, ale kwas krzemowy wytrąca się w postaci galaretowatego osadu."
            },
            {
                q: "Produktem reakcji magnezu z kwasem solnym jest:",
                options: ["Tlen", "Chlor", "Wodór", "Tlenek magnezu"],
                correct: 2,
                explanation: "Metale aktywne wypierają wodór z kwasów: \\(Mg + 2HCl \\rightarrow MgCl_2 + H_2\\uparrow\\)."
            },
            {
                q: "Oranż metylowy w kwasie siarkowodorowym zabarwi się na:",
                options: ["Żółto", "Niebiesko", "Czerwono", "Zielono"],
                correct: 2,
                explanation: "Wszystkie kwasy (tlenowe i beztlenowe) mają odczyn kwasowy, więc barwią oranż metylowy na czerwono."
            },
            {
                q: "Wzór tlenku kwasowego, z którego powstaje kwas azotowy(V), to:",
                options: ["\\(NO\\)", "\\(NO_2\\)", "\\(N_2O_3\\)", "\\(N_2O_5\\)"],
                correct: 3,
                explanation: "Tlenek azotu(V) (\\(N_2O_5\\)) reagując z wodą tworzy kwas azotowy(V)."
            },
            {
                q: "Nazwa systematyczna soli \\(Na_2S\\) to:",
                options: ["Siarczan sodu", "Siarczyn sodu", "Siarczek sodu", "Siarczan(IV) sodu"],
                correct: 2,
                explanation: "Jest to sól kwasu beztlenowego \\(H_2S\\), więc końcówka to -ek."
            },
            {
                q: "W cząsteczce kwasu fosforowego(V) (\\(H_3PO_4\\)) znajduje się łącznie ile atomów?",
                options: ["3", "4", "7", "8"],
                correct: 3,
                explanation: "3 atomy wodoru + 1 atom fosforu + 4 atomy tlenu = 8 atomów."
            },
            {
                q: "Który kwas ma właściwości higroskopijne (pochłania wodę)?",
                options: ["\\(HCl\\)", "\\(H_2S\\)", "\\(H_2SO_4\\)", "\\(H_2CO_3\\)"],
                correct: 2,
                explanation: "Stężony kwas siarkowy(VI) jest silnie higroskopijny i może zwęglać substancje organiczne odbierając im wodę."
            },
            {
                q: "Kwas bromowodorowy to roztwór wodny:",
                options: ["Bromu", "Bromowodoru", "Tlenku bromu", "Bromianu potasu"],
                correct: 1,
                explanation: "Jest to kwas beztlenowy, powstaje przez rozpuszczenie gazowego wodorku - bromowodoru (\\(HBr\\))."
            },
            {
                q: "Wartościowość chloru w kwasie chlorowym(VII) (\\(HClO_4\\)) wynosi:",
                options: ["I", "V", "VII", "VIII"],
                correct: 2,
                explanation: "W nazwie kwasów tlenowych wartościowość niemetalu jest podana w nawiasie."
            },
            {
                q: "Co jest cechą wspólną wszystkich kwasów?",
                options: ["Obecność tlenu", "Obecność wodoru", "Stały stan skupienia", "Brak zapachu"],
                correct: 1,
                explanation: "Każdy kwas (według teorii Arrheniusa) w roztworze wodnym dysocjuje na kationy wodoru."
            },
            {
                q: "Nazwa soli \\(Ca_3(PO_4)_2\\) to:",
                options: ["Fosforan(V) wapnia", "Fosforek wapnia", "Fosforyn wapnia", "Fosforan(III) wapnia"],
                correct: 0,
                explanation: "Sól kwasu fosforowego(V), więc fosforan(V). Wapń jest II-wartościowy, reszta kwasowa III-wartościowa."
            }
        ];

        fetch('../templates/quiz.html')
            .then(response => response.text())
            .then(html => {
                const parser = new DOMParser();
                const doc = parser.parseFromString(html, 'text/html');
                
                doc.querySelectorAll('style').forEach(s => document.head.appendChild(s));
                
                const container = document.getElementById('quiz-container');
                container.innerHTML = doc.body.innerHTML;
                
                doc.querySelectorAll('script').forEach(oldScript => {
                    const newScript = document.createElement('script');
                    newScript.textContent = oldScript.textContent;
                    document.body.appendChild(newScript);
                });
            })
            .catch(err => {
                document.getElementById('quiz-container').innerHTML = `<p class="text-danger text-center">Błąd ładowania quizu. Upewnij się, że używasz serwera HTTP.</p>`;
            });
    </script>
</body>
</html>
