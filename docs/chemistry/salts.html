<!DOCTYPE html>
<html lang="pl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <script>
        (function () {
            const media = window.matchMedia('(prefers-color-scheme: dark)');
            const applyTheme = (isDark) => document.documentElement.setAttribute('data-bs-theme', isDark ? 'dark' : 'light');
            applyTheme(media.matches);
            media.addEventListener('change', (e) => applyTheme(e.matches));
        })();
    </script>
    <title>Test: Sole - Cerebri.pl</title>
    
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;700;800&display=swap" rel="stylesheet">

    <script>
        window.MathJax = {
            tex: { inlineMath: [['\\(', '\\)']] }
        };
    </script>
    <script id="MathJax-script" async src="https://cdn.jsdelivr.net/npm/mathjax@3/es5/tex-mml-chtml.js"></script>
</head>
<body>

    <div id="quiz-container">
        <p class="text-center mt-5">Ładowanie mechanizmu quizu...</p>
    </div>

    <script>
        window.quizConfig = {
            backRoute: 'chemistry',
            backTitle: 'Chemia',
            backUrl: '#!/chemistry',
            backIndex: 'chemistry/index.html',
            correctFeedback: "✅ Poprawnie!",
            wrongFeedback: "❌ Błąd!"
        };

        window.quizResults = {
            perfect: {
                emoji: "💎",
                title: "Mistrzostwo!",
                suggestion: "Perfekcyjny wynik! Sole nie mają przed Tobą tajemnic."
            },
            great: {
                emoji: "🏆",
                title: "Świetny wynik!",
                suggestion: "Brakuje Ci bardzo niewiele do 100%. Spróbuj jeszcze raz, aby wyeliminować ostatnie błędy!"
            },
            good: {
                emoji: "🥈",
                title: "Dobry początek!",
                suggestion: "Masz solidne podstawy, ale możesz uzyskać znacznie lepszy wynik. Rozwiąż test ponownie, by utrwalić wiedzę."
            },
            poor: {
                emoji: "📖",
                title: "Wymaga powtórki",
                suggestion: "Ten dział wymaga jeszcze trochę nauki. Przeczytaj wyjaśnienia i spróbuj uzyskać lepszy wynik w kolejnym podejściu."
            }
        };

        window.questions = [
            {
                q: "Co to są sole?",
                options: ["Związki wodoru i reszty kwasowej", "Związki kationów metalu (lub amonu) i anionów reszty kwasowej", "Roztwory tlenków metali w wodzie", "Związki węgla i tlenu"],
                correct: 1,
                explanation: "Sole to związki chemiczne o budowie jonowej, składające się z kationów metalu (bądź kationu amonu) oraz anionów reszty kwasowej."
            },
            {
                q: "Jaki jest wzór sumaryczny chlorku sodu (soli kuchennej)?",
                options: ["\\(NaClO\\)", "\\(Na_2Cl\\)", "\\(NaCl_2\\)", "\\(NaCl\\)"],
                correct: 3,
                explanation: "Sód jest jednowartościowy, a reszta kwasu solnego (chlorowodorowego) również jest jednowartościowa, stąd wzór to \\(NaCl\\)."
            },
            {
                q: "Jaką wartościowość ma reszta kwasowa w fosforanach(V)?",
                options: ["I", "II", "III", "V"],
                correct: 2,
                explanation: "Kwas fosforowy(V) ma wzór \\(H_3PO_4\\). Ponieważ zawiera trzy atomy wodoru, jego reszta kwasowa (\\(PO_4\\)) jest trójwartościowa."
            },
            {
                q: "Wzór sumaryczny siarczanu(VI) glinu to:",
                options: ["\\(Al_2(SO_4)_3\\)", "\\(AlSO_4\\)", "\\(Al_3(SO_4)_2\\)", "\\(Al(SO_4)_3\\)"],
                correct: 0,
                explanation: "Glin jest trójwartościowy (III), a reszta kwasu siarkowego(VI) (\\(SO_4\\)) jest dwuwartościowa (II). Po regule krzyżowej otrzymujemy \\(Al_2(SO_4)_3\\)."
            },
            {
                q: "Na czym polega reakcja zobojętniania?",
                options: ["Na łączeniu się dwóch soli", "Na reakcji kwasu z zasadą, w wyniku której powstaje sól i woda", "Na rozpadzie soli pod wpływem wody", "Na reakcji metalu z kwasem"],
                correct: 1,
                explanation: "W reakcji zobojętniania jony wodorowe (z kwasu) łączą się z jonami wodorotlenowymi (z zasady), tworząc obojętną cząsteczkę wody, a z pozostałych jonów powstaje sól."
            },
            {
                q: "Która z wymienionych grup soli jest w całości dobrze rozpuszczalna w wodzie?",
                options: ["Siarczki", "Węglany", "Azotany(V)", "Fosforany(V)"],
                correct: 2,
                explanation: "Zgodnie z tabelą rozpuszczalności, wszystkie azotany(V) (sole kwasu azotowego(V)) są dobrze rozpuszczalne w wodzie."
            },
            {
                q: "Jaki odczyn wykazuje wodny roztwór chlorku sodu (\\(NaCl\\))?",
                options: ["Kwasowy", "Zasadowy", "Obojętny", "Zależy od stężenia"],
                correct: 2,
                explanation: "\\(NaCl\\) to sól pochodząca od mocnej zasady (\\(NaOH\\)) i mocnego kwasu (\\(HCl\\)). Jej roztwór nie ulega hydrolizie i ma odczyn obojętny (pH = 7)."
            },
            {
                q: "Głównym składnikiem kredy, marmuru i wapienia jest:",
                options: ["Siarczan(VI) wapnia", "Węglan wapnia", "Chlorek wapnia", "Azotan(V) wapnia"],
                correct: 1,
                explanation: "Skały wapienne zbudowane są w przeważającej części z węglanu wapnia o wzorze \\(CaCO_3\\)."
            },
            {
                q: "Co to jest dysocjacja jonowa soli?",
                options: ["Łączenie się jonów w cząsteczki", "Rozpad soli na kationy wodoru i aniony reszty kwasowej", "Rozpad soli pod wpływem wody na kationy metalu (lub amonu) i aniony reszty kwasowej", "Parowanie wody z roztworu soli"],
                correct: 2,
                explanation: "Rozpuszczalne w wodzie sole dysocjują (rozpadają się) na dodatnio naładowane kationy metalu (lub amonu) i ujemnie naładowane aniony reszty kwasowej."
            },
            {
                q: "Sole kwasu chlorowodorowego (solnego) to:",
                options: ["Chlorany", "Chlorki", "Siarczki", "Węglany"],
                correct: 1,
                explanation: "Kwas chlorowodorowy (\\(HCl\\)) to kwas beztlenowy. Jego sole mają końcówkę '-ek', czyli są to chlorki."
            },
            {
                q: "Wzór azotanu(V) srebra, zwanego dawniej lapisem, to:",
                options: ["\\(Ag_2NO_3\\)", "\\(Ag(NO_3)_2\\)", "\\(AgNO_3\\)", "\\(AgNO_2\\)"],
                correct: 2,
                explanation: "Srebro w tej soli jest jednowartościowe (I), podobnie jak reszta kwasu azotowego(V) (\\(NO_3\\)). Stąd wzór \\(AgNO_3\\)."
            },
            {
                q: "Jaki odczyn wykazuje roztwór węglanu sodu (\\(Na_2CO_3\\))?",
                options: ["Silnie kwasowy", "Słabo kwasowy", "Obojętny", "Zasadowy"],
                correct: 3,
                explanation: "\\(Na_2CO_3\\) to sól mocnej zasady (\\(NaOH\\)) i słabego kwasu (\\(H_2CO_3\\)). Ulega hydrolizie anionowej, nadając roztworowi odczyn zasadowy."
            },
            {
                q: "Co powstaje w wyniku reakcji tlenku metalu z kwasem?",
                options: ["Sól i wodór", "Zasada i woda", "Sól i woda", "Dwie różne sole"],
                correct: 2,
                explanation: "Tlenki metali (tlenki zasadowe) reagują z kwasami w reakcji zobojętniania, a produktami są sól i woda. Np. \\(CuO + 2HCl \\rightarrow CuCl_2 + H_2O\\)."
            },
            {
                q: "Sól powszechnie stosowana jako proszek do pieczenia to:",
                options: ["Węglan sodu", "Wodorowęglan sodu", "Siarczan(VI) magnezu", "Chlorek potasu"],
                correct: 1,
                explanation: "Wodorowęglan sodu (\\(NaHCO_3\\)), znany jako soda oczyszczona, rozkłada się w podwyższonej temperaturze, wydzielając tlenek węgla(IV), co spulchnia ciasto."
            },
            {
                q: "Jaki kolor ma wodny roztwór siarczanu(VI) miedzi(II)?",
                options: ["Bezbarwny", "Żółty", "Niebieski", "Zielony"],
                correct: 2,
                explanation: "Uwodnione jony miedzi(II) (\\(Cu^{2+}\\)) w roztworze wodnym nadają mu charakterystyczną, niebieską barwę."
            },
            {
                q: "Do jakiej grupy soli należy \\(Mg(OH)Cl\\)?",
                options: ["Wodorosole", "Hydroksosole (sole zasadowe)", "Sole podwójne", "Hydraty"],
                correct: 1,
                explanation: "Obecność grupy wodorotlenowej (\\(-OH\\)) w cząsteczce soli wskazuje, że jest to hydroksosól (sól zasadowa) - chlorek wodorotlenek magnezu."
            },
            {
                q: "Na czym polega reakcja strącania osadu?",
                options: ["Na topieniu soli w wysokiej temperaturze", "Na odparowaniu wody z roztworu", "Na utworzeniu trudno rozpuszczalnego związku z mieszaniny dwóch rozpuszczalnych substancji", "Na rozkładzie soli pod wpływem światła"],
                correct: 2,
                explanation: "Reakcje strąceniowe zachodzą w roztworach wodnych, gdy jony łączą się ze sobą, tworząc nierozpuszczalną sól, która wytrąca się w postaci osadu."
            },
            {
                q: "Jaki kolor przyjmuje osad chlorku srebra (\\(AgCl\\))?",
                options: ["Czarny", "Żółty", "Biały", "Czerwony"],
                correct: 2,
                explanation: "Chlorek srebra (\\(AgCl\\)) to charakterystyczny, biały osad, serowaty, który pod wpływem światła powoli ciemnieje."
            },
            {
                q: "Jak powstają wodorosole (sole kwaśne)?",
                options: ["Przez całkowite zobojętnienie kwasu wieloprotonowego", "Przez niecałkowite zastąpienie atomów wodoru w kwasie wieloprotonowym atomami metalu", "W wyniku reakcji tlenku niemetalu z wodą", "Z kwasów jednoprotonowych"],
                correct: 1,
                explanation: "Wodorosole powstają, gdy w reszcie kwasowej pozostają atomy wodoru, np. wodorosiarczan(VI) sodu (\\(NaHSO_4\\)). Wymaga to użycia kwasu zawierającego co najmniej dwa atomy wodoru."
            },
            {
                q: "Wzór siarczku potasu to:",
                options: ["\\(K_2S\\)", "\\(KS_2\\)", "\\(KSO_3\\)", "\\(K_2SO_4\\)"],
                correct: 0,
                explanation: "Kwas siarkowodorowy (\\(H_2S\\)) ma resztę kwasową dwuwartościową (\\(S^{2-}\\)). Potas jest jednowartościowy (\\(K^+\\)). Z reguły krzyżowej otrzymujemy \\(K_2S\\)."
            }
        ];

        fetch('../templates/quiz.html')
            .then(response => response.text())
            .then(html => {
                const parser = new DOMParser();
                const doc = parser.parseFromString(html, 'text/html');
                
                doc.querySelectorAll('style').forEach(s => document.head.appendChild(s));
                
                const container = document.getElementById('quiz-container');
                container.innerHTML = doc.body.innerHTML;
                
                doc.querySelectorAll('script').forEach(oldScript => {
                    const newScript = document.createElement('script');
                    newScript.textContent = oldScript.textContent;
                    document.body.appendChild(newScript);
                });
            })
            .catch(err => {
                document.getElementById('quiz-container').innerHTML = `<p class="text-danger text-center">Błąd ładowania quizu. Upewnij się, że używasz serwera HTTP.</p>`;
            });
    </script>
</body>
</html>
