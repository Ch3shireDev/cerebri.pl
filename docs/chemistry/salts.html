<!DOCTYPE html>
<html lang="pl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <script>
        (function () {
            const media = window.matchMedia('(prefers-color-scheme: dark)');
            const applyTheme = (isDark) => document.documentElement.setAttribute('data-bs-theme', isDark ? 'dark' : 'light');
            applyTheme(media.matches);
            media.addEventListener('change', (e) => applyTheme(e.matches));
        })();
    </script>
    <title>Test: Sole - Cerebri.pl</title>
    
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;700;800&display=swap" rel="stylesheet">

    <script>
        window.MathJax = {
            tex: { inlineMath: [['\\(', '\\)']] }
        };
    </script>
    <script id="MathJax-script" async src="https://cdn.jsdelivr.net/npm/mathjax@3/es5/tex-mml-chtml.js"></script>
</head>
<body>

    <div id="quiz-container">
        <p class="text-center mt-5">Ładowanie mechanizmu quizu...</p>
    </div>

    <script>
        // Konfiguracja nawigacji
        window.quizConfig = {
            backRoute: 'chemistry',
            backTitle: 'Chemia',
            backUrl: '#!/chemistry',
            backIndex: 'chemistry/index.html'
        };

        // Konfiguracja wyników quizu
        window.quizResults = {
            perfect: {
                emoji: "💎",
                title: "Mistrzostwo!",
                suggestion: "Perfekcyjny wynik! Jesteś ekspertem od soli."
            },
            great: {
                emoji: "🏆",
                title: "Świetny wynik!",
                suggestion: "Brakuje Ci bardzo niewiele do 100%. Spróbuj jeszcze raz, aby wyeliminować ostatnie błędy!"
            },
            good: {
                emoji: "🥈",
                title: "Dobry początek!",
                suggestion: "Masz solidne podstawy, ale możesz uzyskać znacznie lepszy wynik. Rozwiąż test ponownie, by utrwalić wiedzę."
            },
            poor: {
                emoji: "📖",
                title: "Wymaga powtórki",
                suggestion: "Sole wymagają jeszcze trochę nauki. Przeczytaj wyjaśnienia i spróbuj uzyskać lepszy wynik w kolejnym podejściu."
            }
        };

        // Dane quizu
        window.questions = [
            {
                q: "Co to są sole w chemii?",
                options: ["Związki wodoru z niemetalami", "Związki powstałe z kwasu i zasady w reakcji zobojętniania", "Tlenki metali", "Wodorotlenki metali"],
                correct: 1,
                explanation: "Sole to związki chemiczne powstające w reakcji kwasu z zasadą (zobojętniania). Ogólny wzór to: MeₙRₘ, gdzie Me to kation metalu, a R to reszta kwasowa."
            },
            {
                q: "Jaki jest wzór sumaryczny chlorku sodu?",
                options: ["\\(NaOH\\)", "\\(NaCl\\)", "\\(Na_2SO_4\\)", "\\(NaNO_3\\)"],
                correct: 1,
                explanation: "Chlorek sodu (\\(NaCl\\)) to powszechna sól kuchenna. Składa się z kationów sodu \\(Na^+\\) i anionów chlorkowych \\(Cl^-\\)."
            },
            {
                q: "Jak nazywamy reakcję kwasu z zasadą, w wyniku której powstaje sól i woda?",
                options: ["Reakcja syntezy", "Reakcja rozkładu", "Reakcja zobojętniania", "Reakcja spalania"],
                correct: 2,
                explanation: "Reakcja zobojętniania to reakcja kwasu z zasadą, w wyniku której powstaje sól i woda. Np. \\(HCl + NaOH \\rightarrow NaCl + H_2O\\)."
            },
            {
                q: "Sole jakiego kwasu nazywamy siarczanami(VI)?",
                options: ["Kwasu siarkowodorowego", "Kwasu siarkawego", "Kwasu siarkowego(VI)", "Kwasu azotowego(V)"],
                correct: 2,
                explanation: "Siarczany(VI) to sole kwasu siarkowego(VI) (\\(H_2SO_4\\)). Przykładem jest siarczan(VI) sodu \\(Na_2SO_4\\)."
            },
            {
                q: "Który ze związków jest solą?",
                options: ["\\(NaOH\\)", "\\(H_2SO_4\\)", "\\(CaCO_3\\)", "\\(Ca(OH)_2\\)"],
                correct: 2,
                explanation: "Węglan wapnia \\(CaCO_3\\) jest solą kwasu węglowego. \\(NaOH\\) i \\(Ca(OH)_2\\) to zasady, a \\(H_2SO_4\\) to kwas."
            },
            {
                q: "Jak nazywa się sól o wzorze \\(CaSO_4\\)?",
                options: ["Siarczan(VI) wapnia", "Siarczek wapnia", "Siarczyn wapnia", "Węglan wapnia"],
                correct: 0,
                explanation: "\\(CaSO_4\\) to siarczan(VI) wapnia, znany też jako gips. Pochodzi od kwasu siarkowego(VI) i wodorotlenku wapnia."
            },
            {
                q: "Jaką metodą można otrzymać sól, reagując metal z kwasem?",
                options: ["Tylko metale szlachetne reagują z kwasami", "Aktywne metale wypierają wodór z kwasów, tworząc sól i \\(H_2\\)", "Metal reaguje z kwasem tworząc tlenek metalu", "Metal reaguje z kwasem tworząc wodorotlenek"],
                correct: 1,
                explanation: "Aktywne metale (np. Zn, Fe, Mg) reagują z kwasami, wypierając wodór. Np. \\(Zn + H_2SO_4 \\rightarrow ZnSO_4 + H_2\\uparrow\\)."
            },
            {
                q: "Wzór siarczku żelaza(II) to:",
                options: ["\\(FeSO_4\\)", "\\(Fe_2S_3\\)", "\\(FeS\\)", "\\(Fe_2(SO_4)_3\\)"],
                correct: 2,
                explanation: "Siarczek żelaza(II) to \\(FeS\\). Żelazo ma tutaj wartościowość II, a siarka (jako reszta kwasowa siarkowodoru) wartościowość II."
            },
            {
                q: "Jak brzmi nazwa soli \\(Na_2CO_3\\)?",
                options: ["Węglan sodu", "Chlorek sodu", "Siarczan(VI) sodu", "Azotan(V) sodu"],
                correct: 0,
                explanation: "\\(Na_2CO_3\\) to węglan sodu, znany jako soda kalcynowana. Pochodzi od kwasu węglowego \\(H_2CO_3\\)."
            },
            {
                q: "Które stwierdzenie dotyczące rozpuszczalności soli jest prawidłowe?",
                options: ["Wszystkie sole są dobrze rozpuszczalne w wodzie", "Wszystkie sole są nierozpuszczalne w wodzie", "Siarczan baru \\(BaSO_4\\) jest nierozpuszczalny w wodzie", "Sole kwasu węglowego są dobrze rozpuszczalne w wodzie"],
                correct: 2,
                explanation: "Siarczan baru \\(BaSO_4\\) jest praktycznie nierozpuszczalny w wodzie. Rozpuszczalność soli jest różna i zależy od konkretnego związku."
            },
            {
                q: "Jaką wartościowość ma żelazo w \\(Fe_2(SO_4)_3\\)?",
                options: ["I", "II", "III", "IV"],
                correct: 2,
                explanation: "W \\(Fe_2(SO_4)_3\\) są dwa atomy żelaza i trzy grupy siarczanowe \\(SO_4^{2-}\\). Łączny ładunek anionów wynosi -6, więc każdy atom Fe ma ładunek +3, co odpowiada wartościowości III."
            },
            {
                q: "Jaką metodą można otrzymać sól, reagując tlenek metalu z kwasem?",
                options: ["Nie jest możliwe otrzymanie soli z tlenku metalu i kwasu", "Tlenek metalu reaguje z kwasem tworząc sól i wodę", "Tlenek metalu reaguje z kwasem tworząc tylko wodę", "Tlenek metalu reaguje z kwasem tworząc tlenek i wodę"],
                correct: 1,
                explanation: "Tlenki zasadowe (tlenki metali) reagują z kwasami, tworząc sól i wodę. Np. \\(CuO + H_2SO_4 \\rightarrow CuSO_4 + H_2O\\)."
            },
            {
                q: "Jaki kolor ma siarczan(VI) miedzi(II) (\\(CuSO_4 \\cdot 5H_2O\\))?",
                options: ["Biały", "Zielony", "Niebieski", "Żółty"],
                correct: 2,
                explanation: "Hydrat siarczanu(VI) miedzi(II) \\(CuSO_4 \\cdot 5H_2O\\) to niebieski krystaliczny proszek zwany witriołem miedzianym. Bezwodny \\(CuSO_4\\) jest biały."
            },
            {
                q: "Wzór fosforanu(V) wapnia to:",
                options: ["\\(CaPO_4\\)", "\\(Ca_3(PO_4)_2\\)", "\\(Ca_2PO_4\\)", "\\(Ca(PO_4)_2\\)"],
                correct: 1,
                explanation: "Fosforan(V) wapnia ma wzór \\(Ca_3(PO_4)_2\\). Wapń ma wartościowość II, a reszta kwasowa \\(PO_4^{3-}\\) wartościowość III. NWW(2,3) = 6, więc Ca₃ i (PO₄)₂."
            },
            {
                q: "Która z reakcji prowadzi do powstania azotanu(V) srebra (\\(AgNO_3\\))?",
                options: ["Reakcja srebra z kwasem siarkowym(VI)", "Reakcja srebra z kwasem azotowym(V)", "Reakcja tlenku srebra z kwasem siarkowym(VI)", "Reakcja tlenku srebra z kwasem azotowym(V)"],
                correct: 3,
                explanation: "\\(Ag_2O + 2HNO_3 \\rightarrow 2AgNO_3 + H_2O\\). Srebro jest metalem szlachetnym i nie reaguje z rozcieńczonymi kwasami bezpośrednio, jednak tlenek srebra reaguje z kwasem azotowym."
            },
            {
                q: "Sole kwasu azotowego(V) to:",
                options: ["Azotyny", "Azotany(V)", "Amoniak", "Azotany(III)"],
                correct: 1,
                explanation: "Sole kwasu azotowego(V) (\\(HNO_3\\)) to azotany(V). Sole kwasu azotowego(III) (\\(HNO_2\\)) to natomiast azotany(III), czyli azotyny."
            },
            {
                q: "Jak nazywamy sole kwasu węglowego?",
                options: ["Węgliki", "Wodorowęglany", "Węglany", "Węglowodory"],
                correct: 2,
                explanation: "Sole kwasu węglowego (\\(H_2CO_3\\)) to węglany. Przykłady: węglan wapnia \\(CaCO_3\\) (wapień), węglan sodu \\(Na_2CO_3\\) (soda)."
            },
            {
                q: "Co to są sole podwójne?",
                options: ["Sole zawierające dwa różne aniony kwasowe", "Sole zawierające dwa różne kationy metali", "Sole zawierające atomy dwóch różnych metali i jedną resztę kwasową", "Sole, które reagują dwa razy z zasadą"],
                correct: 2,
                explanation: "Sole podwójne zawierają dwa różne kationy metali i jedną resztę kwasową. Przykładem jest ałun potasowy \\(KAl(SO_4)_2 \\cdot 12H_2O\\)."
            },
            {
                q: "W wyniku jakiej reakcji można otrzymać sól bezpośrednio z pierwiastków?",
                options: ["Tylko w reakcji zobojętniania", "W reakcji niemetalu z metalem (synteza)", "W reakcji tlenku niemetalu z metalem", "W reakcji wodoru z tlenem"],
                correct: 1,
                explanation: "Niektóre sole można otrzymać bezpośrednio z pierwiastków w reakcji syntezy. Np. \\(2Na + Cl_2 \\rightarrow 2NaCl\\) (spalanie sodu w chlorze)."
            },
            {
                q: "Jaki osad powstaje w reakcji \\(BaCl_2\\) z \\(Na_2SO_4\\)?",
                options: ["\\(NaCl\\)", "\\(BaSO_4\\)", "\\(BaCl_2\\) nie reaguje z \\(Na_2SO_4\\)", "\\(Ba(OH)_2\\)"],
                correct: 1,
                explanation: "\\(BaCl_2 + Na_2SO_4 \\rightarrow BaSO_4\\downarrow + 2NaCl\\). Siarczan baru (\\(BaSO_4\\)) jest praktycznie nierozpuszczalny i wytrąca się jako biały osad. Reakcja ta służy do wykrywania jonów siarczanowych(VI)."
            }
        ];

        // Mechanizm include frontend-only
        fetch('../templates/quiz.html')
            .then(response => response.text())
            .then(html => {
                const parser = new DOMParser();
                const doc = parser.parseFromString(html, 'text/html');
                
                // Dołącz style
                doc.querySelectorAll('style').forEach(s => document.head.appendChild(s));
                
                // Dołącz strukturę DOM (DOMParser umieszcza divy z top-level wewnątrz <body>)
                const container = document.getElementById('quiz-container');
                container.innerHTML = doc.body.innerHTML;
                
                // Wstrzyknij i wykonaj JS (innerHTML ignoruje tagi <script>)
                doc.querySelectorAll('script').forEach(oldScript => {
                    const newScript = document.createElement('script');
                    newScript.textContent = oldScript.textContent;
                    document.body.appendChild(newScript);
                });
            })
            .catch(err => {
                document.getElementById('quiz-container').innerHTML = `<p class="text-danger text-center">Błąd ładowania quizu. Upewnij się, że używasz serwera HTTP.</p>`;
            });
    </script>
</body>
</html>
