<!DOCTYPE html>
<html lang="pl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <script>
        (function () {
            const media = window.matchMedia('(prefers-color-scheme: dark)');
            const applyTheme = (isDark) => document.documentElement.setAttribute('data-bs-theme', isDark ? 'dark' : 'light');
            applyTheme(media.matches);
            media.addEventListener('change', (e) => applyTheme(e.matches));
        })();
    </script>
    <title>Test: Kwasy Tlenowe - Cerebri.pl</title>
    
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;700;800&display=swap" rel="stylesheet">

    <script>
        window.MathJax = {
            tex: { inlineMath: [['\\(', '\\)']] }
        };
    </script>
    <script id="MathJax-script" async src="https://cdn.jsdelivr.net/npm/mathjax@3/es5/tex-mml-chtml.js"></script>
</head>
<body>

    <div id="quiz-container">
        <p class="text-center mt-5">Ładowanie mechanizmu quizu...</p>
    </div>

    <script>
        // Konfiguracja nawigacji
        window.quizConfig = {
            backRoute: 'chemistry',
            backTitle: 'Chemia',
            backUrl: '#!/chemistry',
            backIndex: 'chemistry/index.html'
        };

        // Konfiguracja wyników quizu
        window.quizResults = {
            perfect: {
                emoji: "💎",
                title: "Mistrzostwo!",
                suggestion: "Perfekcyjny wynik! Jesteś ekspertem od kwasów tlenowych."
            },
            great: {
                emoji: "🏆",
                title: "Świetny wynik!",
                suggestion: "Brakuje Ci bardzo niewiele do 100%. Spróbuj jeszcze raz, aby wyeliminować ostatnie błędy!"
            },
            good: {
                emoji: "🥈",
                title: "Dobry początek!",
                suggestion: "Masz solidne podstawy, ale możesz uzyskać znacznie lepszy wynik. Rozwiąż test ponownie, by utrwalić wiedzę."
            },
            poor: {
                emoji: "📖",
                title: "Wymaga powtórki",
                suggestion: "Kwasy tlenowe wymagają jeszcze trochę nauki. Przeczytaj wyjaśnienia i spróbuj uzyskać lepszy wynik w kolejnym podejściu."
            }
        };

        // Dane quizu
        window.questions = [
            {
                q: "Jaki jest wzór sumaryczny kwasu siarkowego(VI)?",
                options: ["\\(H_2SO_4\\)", "\\(H_2SO_3\\)", "\\(H_2S\\)", "\\(H_2SO_2\\)"],
                correct: 0,
                explanation: "Kwas siarkowy(VI) ma wzór \\(H_2SO_4\\). Jest to silny kwas tlenowy, silnie higroskopijny."
            },
            {
                q: "Sole kwasu azotowego(V) to:",
                options: ["Azotany(III)", "Azotyny", "Azotany(V)", "Azotki"],
                correct: 2,
                explanation: "Sole kwasów tlenowych mają końcówkę '-an'. Dla kwasu azotowego(V) są to azotany(V)."
            },
            {
                q: "Który tlenek po reakcji z wodą tworzy kwas fosforowy(V)?",
                options: ["\\(P_2O_3\\)", "\\(P_4O_{10}\\)", "\\(PO_2\\)", "\\(P_2O_5\\) (niepoprawny technicznie)"],
                correct: 1,
                explanation: "Kwas fosforowy(V) powstaje w reakcji tlenku fosforu(V) z wodą. Poprawny wzór dimeryczny tego tlenku to \\(P_4O_{10}\\)."
            },
            {
                q: "Wzór sumaryczny kwasu węglowego to:",
                options: ["\\(HCO_3\\)", "\\(H_2C\\)", "\\(H_2CO_3\\)", "\\(H_2CO_2\\)"],
                correct: 2,
                explanation: "Kwas węglowy ma wzór \\(H_2CO_3\\). Jest on kwasem nietrwałym i łatwo rozkłada się na wodę i dwutlenek węgla."
            },
            {
                q: "Jaką wartościowość ma reszta kwasowa w kwasie siarkowym(IV)?",
                options: ["I", "II", "III", "IV"],
                correct: 1,
                explanation: "Wzór kwasu to \\(H_2SO_3\\). Ponieważ są dwa atomy wodoru, reszta kwasowa (\\(SO_3\\)) jest dwuwartościowa."
            },
            {
                q: "Kwas tlenowy, który zabarwia białko na żółto (reakcja ksantoproteinowa) to:",
                options: ["\\(H_2SO_4\\)", "\\(H_3PO_4\\)", "\\(HNO_3\\)", "\\(H_2CO_3\\)"],
                correct: 2,
                explanation: "Kwas azotowy(V) (\\(HNO_3\\)) reaguje z białkami, tworząc charakterystyczne żółte zabarwienie."
            },
            {
                q: "Nazwa soli o wzorze \\(Na_2SO_3\\) to:",
                options: ["Siarczan(VI) sodu", "Siarczek sodu", "Siarczyn sodu", "Siarczan(IV) sodu"],
                correct: 3,
                explanation: "Sól pochodzi od kwasu siarkowego(IV) (\\(H_2SO_3\\)), więc poprawna nazwa systematyczna to siarczan(IV) sodu."
            },
            {
                q: "Który z wymienionych kwasów jest składnikiem napojów typu 'Cola'?",
                options: ["\\(HNO_3\\)", "\\(H_2SO_4\\)", "\\(H_3PO_4\\)", "\\(H_2SiO_3\\)"],
                correct: 2,
                explanation: "Kwas fosforowy(V) (\\(H_3PO_4\\)) jest stosowany w przemyśle spożywczym jako regulator kwasowości, np. w napojach gazowanych."
            },
            {
                q: "Wzór tlenku kwasowego dla kwasu siarkowego(VI) to:",
                options: ["\\(SO_2\\)", "\\(SO_3\\)", "\\(S_2O_3\\)", "\\(SO_4\\)"],
                correct: 1,
                explanation: "Tlenek siarki(VI) (\\(SO_3\\)) po połączeniu z wodą tworzy kwas siarkowy(VI)."
            },
            {
                q: "Jaki kwas powstaje w wyniku reakcji tlenku węgla(IV) z wodą?",
                options: ["Kwas mrówkowy", "Kwas octowy", "Kwas węglowy", "Kwas szczawiowy"],
                correct: 2,
                explanation: "\\(CO_2 + H_2O \\rightarrow H_2CO_3\\). Jest to reakcja odwracalna."
            },
            {
                q: "Właściwość kwasu siarkowego(VI), polegająca na zwęglaniu substancji organicznych (np. cukru), to:",
                options: ["Higroskopijność", "Lotność", "Uzdolnienie redukujące", "Zasadowość"],
                correct: 0,
                explanation: "Higroskopijność to zdolność do pochłaniania wody. \\(H_2SO_4\\) odbiera wodę z cząsteczek cukru, zostawiając czysty węgiel."
            },
            {
                q: "Wartościowość azotu w kwasie azotowym(V) wynosi:",
                options: ["III", "V", "IV", "I"],
                correct: 1,
                explanation: "Jak sama nazwa wskazuje, azot w kwasie azotowym(V) jest pięciowartościowy."
            },
            {
                q: "Kwas krzemowy ma wzór:",
                options: ["\\(H_2SiO_3\\)", "\\(HSiO_4\\)", "\\(H_2Si\\)", "\\(H_4SiO_4\\)"],
                correct: 0,
                explanation: "Kwas krzemowy to \\(H_2SiO_3\\). Jest on kwasem bardzo słabym i trudno rozpuszczalnym w wodzie (tworzy żel)."
            },
            {
                q: "Jaka jest złota zasada przy rozcieńczaniu kwasu siarkowego(VI)?",
                options: ["Wlewaj kwas do wody", "Wlewaj wodę do kwasu", "Mieszaj szybko bez wody", "Nie wolno ich łączyć"],
                correct: 0,
                explanation: "'Pamiętaj chemiku młody, wlewaj zawsze kwas do wody'. Reakcja jest silnie egzotermiczna."
            },
            {
                q: "Który kwas tlenowy jest nietrwały i łatwo ulega rozkładowi?",
                options: ["\\(H_2SO_4\\)", "\\(H_2CO_3\\)", "\\(H_3PO_4\\)", "\\(H_2SiO_3\\)"],
                correct: 1,
                explanation: "Kwas węglowy rozkłada się nawet w temperaturze pokojowej, co obserwujemy jako bąbelki gazu w napojach gazowanych."
            },
            {
                q: "Wzór soli: azotan(V) wapnia to:",
                options: ["\\(CaNO_3\\)", "\\(Ca(NO_2)_2\\)", "\\(Ca(NO_3)_2\\)", "\\(Ca_2NO_3\\)"],
                correct: 2,
                explanation: "Reszta kwasowa \\(NO_3\\) jest I-wartościowa, a wapń II-wartościowy, stąd wzór \\(Ca(NO_3)_2\\)."
            },
            {
                q: "Jaki kolor przyjmuje oranż metylowy w roztworach kwasów?",
                options: ["Niebieski", "Żółty", "Czerwony", "Bezbarwny"],
                correct: 2,
                explanation: "Oranż metylowy w środowisku kwasowym zmienia barwę z pomarańczowej na czerwoną."
            },
            {
                q: "Kwas siarkowy(IV) ma nazwę zwyczajową:",
                options: ["Kwas siarkawy", "Kwas siarkowy", "Kwas witriolowy", "Kwas solny"],
                correct: 0,
                explanation: "Kwas siarkowy(IV) to kwas siarkawy. Posiada właściwości bielące."
            },
            {
                q: "Ile atomów tlenu znajduje się w cząsteczce kwasu fosforowego(V)?",
                options: ["2", "3", "4", "5"],
                correct: 2,
                explanation: "Wzór kwasu to \\(H_3PO_4\\), więc w cząsteczce są 4 atomy tlenu."
            },
            {
                q: "Sole kwasu węglowego to:",
                options: ["Węglany", "Węgliki", "Węglany(IV)", "Obie odpowiedzi A i C są poprawne"],
                correct: 3,
                explanation: "Sole kwasu węglowego nazywamy węglanami, a systematycznie węglanami(IV)."
            }
        ];

        // Mechanizm include frontend-only
        fetch('../templates/quiz.html')
            .then(response => response.text())
            .then(html => {
                const parser = new DOMParser();
                const doc = parser.parseFromString(html, 'text/html');
                
                doc.querySelectorAll('style').forEach(s => document.head.appendChild(s));
                
                const container = document.getElementById('quiz-container');
                container.innerHTML = doc.body.innerHTML;
                
                doc.querySelectorAll('script').forEach(oldScript => {
                    const newScript = document.createElement('script');
                    newScript.textContent = oldScript.textContent;
                    document.body.appendChild(newScript);
                });
            })
            .catch(err => {
                document.getElementById('quiz-container').innerHTML = `<p class="text-danger text-center">Błąd ładowania quizu. Upewnij się, że używasz serwera HTTP.</p>`;
            });
    </script>
</body>
</html>
