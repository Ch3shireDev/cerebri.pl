<!DOCTYPE html>
<html lang="pl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <script>
        (function () {
            const media = window.matchMedia('(prefers-color-scheme: dark)');
            const applyTheme = (isDark) => document.documentElement.setAttribute('data-bs-theme', isDark ? 'dark' : 'light');
            applyTheme(media.matches);
            media.addEventListener('change', (e) => applyTheme(e.matches));
        })();
    </script>
    <title>Test: Kwasy Beztlenowe - Cerebri.pl</title>
    
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;700;800&display=swap" rel="stylesheet">

    <script>
        window.MathJax = {
            tex: { inlineMath: [['\\(', '\\)']] }
        };
    </script>
    <script id="MathJax-script" async src="https://cdn.jsdelivr.net/npm/mathjax@3/es5/tex-mml-chtml.js"></script>
</head>
<body>

    <div id="quiz-container">
        <p class="text-center mt-5">Ładowanie mechanizmu quizu...</p>
    </div>

    <script>
        // Konfiguracja nawigacji
        window.quizConfig = {
            backRoute: 'chemistry',
            backTitle: 'Chemia',
            backUrl: '#!/chemistry',
            backIndex: 'chemistry/index.html'
        };

        // Konfiguracja wyników quizu
        window.quizResults = {
            perfect: {
                emoji: "💎",
                title: "Mistrzostwo!",
                suggestion: "Perfekcyjny wynik! Jesteś ekspertem od kwasów beztlenowych."
            },
            great: {
                emoji: "🏆",
                title: "Świetny wynik!",
                suggestion: "Brakuje Ci bardzo niewiele do 100%. Spróbuj jeszcze raz, aby wyeliminować ostatnie błędy!"
            },
            good: {
                emoji: "🥈",
                title: "Dobry początek!",
                suggestion: "Masz solidne podstawy, ale możesz uzyskać znacznie lepszy wynik. Rozwiąż test ponownie, by utrwalić wiedzę."
            },
            poor: {
                emoji: "📖",
                title: "Wymaga powtórki",
                suggestion: "Kwasy beztlenowe wymagają jeszcze trochę nauki. Przeczytaj wyjaśnienia i spróbuj uzyskać lepszy wynik w kolejnym podejściu."
            }
        };
// Dane quizu — wyłącznie kwasy beztlenowe
window.questions = [
    {
        q: "Jaki jest wzór sumaryczny kwasu chlorowodorowego (solnego)?",
        options: ["\\(HCl\\)", "\\(H_2S\\)", "\\(HClO\\)", "\\(NaCl\\)"],
        correct: 0,
        explanation: "Kwas chlorowodorowy to wodny roztwór chlorowodoru o wzorze \\(HCl\\). Jest to kwas beztlenowy, ponieważ nie zawiera atomów tlenu."
    },
    {
        q: "Jak nazywają się sole kwasu siarkowodorowego?",
        options: ["Siarczany(VI)", "Siarczyny", "Siarczki", "Siarczany(IV)"],
        correct: 2,
        explanation: "Kwas siarkowodorowy ma wzór \\(H_2S\\). Sole pochodzące od tego kwasu nazywamy siarczkami."
    },
    {
        q: "Który kwas beztlenowy ma zdolność trawienia szkła?",
        options: ["Kwas solny", "Kwas fluorowodorowy", "Kwas siarkowodorowy", "Kwas bromowodorowy"],
        correct: 1,
        explanation: "Kwas fluorowodorowy \\(HF\\) reaguje z krzemionką obecną w szkle. Z tego powodu nie przechowuje się go w naczyniach szklanych."
    },
    {
        q: "Wzór sumaryczny kwasu siarkowodorowego to:",
        options: ["\\(H_2SO_4\\)", "\\(H_2SO_3\\)", "\\(HS\\)", "\\(H_2S\\)"],
        correct: 3,
        explanation: "Kwas siarkowodorowy jest wodnym roztworem siarkowodoru i ma wzór \\(H_2S\\)."
    },
    {
        q: "Jaką wartościowość ma reszta kwasowa w kwasie jodowodorowym?",
        options: ["I", "II", "III", "IV"],
        correct: 0,
        explanation: "Kwas jodowodorowy ma wzór \\(HI\\). Ponieważ zawiera jeden atom wodoru, jego reszta kwasowa jest jednowartościowa."
    },
    {
        q: "Jak otrzymuje się kwasy beztlenowe?",
        options: ["Reakcja tlenku niemetalu z wodą", "Rozpuszczenie odpowiedniego wodorku niemetalu w wodzie", "Reakcja metalu z wodą", "Reakcja kwasu z zasadą"],
        correct: 1,
        explanation: "Kwasy beztlenowe otrzymuje się przez rozpuszczanie wodorków niemetali w wodzie, na przykład \\(HCl\\) lub \\(H_2S\\)."
    },
    {
        q: "Gaz o ostrym, duszącym zapachu, który po rozpuszczeniu w wodzie tworzy kwas chlorowodorowy, to:",
        options: ["Chlorowodór", "Chlor", "Dwutlenek chloru", "Siarkowodór"],
        correct: 0,
        explanation: "Chlorowodór \\(HCl\\) jest gazem. Jego wodny roztwór to kwas chlorowodorowy."
    },
    {
        q: "Kwas cyjanowodorowy ma wzór:",
        options: ["\\(HCN\\)", "\\(HCNO\\)", "\\(H_2CN\\)", "\\(HNC\\)"],
        correct: 0,
        explanation: "Kwas cyjanowodorowy ma wzór \\(HCN\\). Jest to kwas beztlenowy, ponieważ nie zawiera tlenu."
    },
    {
        q: "Jak brzmi nazwa systematyczna soli o wzorze \\(KF\\)?",
        options: ["Fluorowodór potasu", "Fluorek potasu", "Fluorian potasu", "Kwas fluorowodorowy"],
        correct: 1,
        explanation: "Sól \\(KF\\) pochodzi od kwasu fluorowodorowego \\(HF\\). Jej nazwa to fluorek potasu."
    },
    {
        q: "Który kwas beztlenowy jest składnikiem soków żołądkowych człowieka?",
        options: ["Kwas siarkowodorowy", "Kwas bromowodorowy", "Kwas solny", "Kwas fluorowodorowy"],
        correct: 2,
        explanation: "W soku żołądkowym człowieka występuje kwas chlorowodorowy, nazywany też kwasem solnym."
    },
    {
        q: "Kwas o zapachu zgniłych jaj to:",
        options: ["Kwas fluorowodorowy", "Kwas siarkowodorowy", "Kwas solny", "Kwas cyjanowodorowy"],
        correct: 1,
        explanation: "Kwas siarkowodorowy jest związany z obecnością siarkowodoru \\(H_2S\\), który ma charakterystyczny zapach zgniłych jaj."
    },
    {
        q: "Wartościowość chloru w kwasie chlorowodorowym wynosi:",
        options: ["I", "III", "V", "VII"],
        correct: 0,
        explanation: "Kwas chlorowodorowy ma wzór \\(HCl\\). Reszta kwasowa jest jednowartościowa, więc chlor ma tutaj wartościowość I."
    },
    {
        q: "Jaki jest produkt gazowy reakcji magnezu z kwasem chlorowodorowym?",
        options: ["Tlen", "Chlor", "Wodór", "Dwutlenek węgla"],
        correct: 2,
        explanation: "Magnez reaguje z kwasem chlorowodorowym zgodnie z równaniem: \\(Mg + 2HCl \\rightarrow MgCl_2 + H_2\\). Produktem gazowym jest wodór."
    },
    {
        q: "Jakiego koloru nabierze uniwersalny papierek wskaźnikowy zanurzony w kwasie bromowodorowym?",
        options: ["Niebieskiego", "Żółtego", "Zielonego", "Czerwonego"],
        correct: 3,
        explanation: "Kwas bromowodorowy daje odczyn kwasowy, dlatego papierek uniwersalny przyjmuje barwę czerwoną."
    },
    {
        q: "Z jakich pierwiastków składa się kwas siarkowodorowy?",
        options: ["Wodór, siarka, tlen", "Wodór, siarka", "Siarka, tlen", "Wodór, węgiel, siarka"],
        correct: 1,
        explanation: "Kwas siarkowodorowy ma wzór \\(H_2S\\), więc składa się wyłącznie z wodoru i siarki."
    },
    {
        q: "Nazwa soli \\(Ag_2S\\) to:",
        options: ["Siarczan(VI) srebra", "Siarczyn srebra(I)", "Siarczek srebra(I)", "Srebrzan siarki"],
        correct: 2,
        explanation: "Związek \\(Ag_2S\\) jest solą kwasu siarkowodorowego, dlatego nosi nazwę siarczek srebra(I)."
    },
    {
        q: "Który z poniższych kwasów beztlenowych pachnie gorzkimi migdałami?",
        options: ["\\(H_2S\\)", "\\(HCl\\)", "\\(HCN\\)", "\\(HF\\)"],
        correct: 2,
        explanation: "Kwas cyjanowodorowy \\(HCN\\) jest silnie trującą substancją, tradycyjnie kojarzoną z zapachem gorzkich migdałów."
    },
    {
        q: "Jakiej wartościowości resztę kwasową posiadają kwasy fluorowcowodorowe \\(HF\\), \\(HCl\\), \\(HBr\\), \\(HI\\)?",
        options: ["I", "II", "III", "IV"],
        correct: 0,
        explanation: "Każdy z tych kwasów zawiera jeden atom wodoru, więc ich reszta kwasowa jest jednowartościowa."
    },
    {
        q: "Co jest wspólną cechą wszystkich kwasów beztlenowych?",
        options: ["Są bardzo słabe", "Brak atomów tlenu w cząsteczce", "Są gazami w temperaturze pokojowej", "Mają zapach zgniłych jaj"],
        correct: 1,
        explanation: "Kwasy beztlenowe nie zawierają atomów tlenu w cząsteczce. To ich podstawowa cecha odróżniająca je od kwasów tlenowych."
    },
    {
        q: "Wzór kwasu bromowodorowego to:",
        options: ["\\(HBrO\\)", "\\(HBr\\)", "\\(H_2Br\\)", "\\(HBrO_3\\)"],
        correct: 1,
        explanation: "Kwas bromowodorowy ma wzór \\(HBr\\). Jest to kwas beztlenowy, bo nie zawiera tlenu."
    }
];

        // Mechanizm include frontend-only
        fetch('../templates/quiz.html')
            .then(response => response.text())
            .then(html => {
                const parser = new DOMParser();
                const doc = parser.parseFromString(html, 'text/html');
                
                // Dołącz style
                doc.querySelectorAll('style').forEach(s => document.head.appendChild(s));
                
                // Dołącz strukture DOM (DOMParser umieszcza divy z top-level wewnątrz <body>)
                const container = document.getElementById('quiz-container');
                container.innerHTML = doc.body.innerHTML;
                
                // Wstrzyknij i wykonaj JS (innerHTML ignoruje tagi <script>)
                doc.querySelectorAll('script').forEach(oldScript => {
                    const newScript = document.createElement('script');
                    newScript.textContent = oldScript.textContent;
                    document.body.appendChild(newScript);
                });
            })
            .catch(err => {
                document.getElementById('quiz-container').innerHTML = `<p class="text-danger text-center">Błąd ładowania quizu. Upewnij się, że używasz serwera HTTP.</p>`;
            });
    </script>
</body>
</html>
