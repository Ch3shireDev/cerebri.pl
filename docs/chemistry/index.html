<!DOCTYPE html>
<html lang="pl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <script>
        (function () {
            const media = window.matchMedia('(prefers-color-scheme: dark)');
            const applyTheme = (isDark) => document.documentElement.setAttribute('data-bs-theme', isDark ? 'dark' : 'light');
            applyTheme(media.matches);
            media.addEventListener('change', (e) => applyTheme(e.matches));
        })();
    </script>
    <title>Chemia - Cerebri.pl</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;700;800&display=swap" rel="stylesheet">

    <style>
        :root {
            --bg-primary: #f0fcfd;
            --bg-secondary: #ffffff;
            --text-primary: #2c3e50;
            --text-secondary: #666666;
            --accent-color: #0abde3;
            --accent-hover: #0899cc;
            --card-border: rgba(0,0,0,0.1);
        }

        [data-bs-theme="dark"] {
            --bg-primary: #1a1a1a;
            --bg-secondary: #2d2d2d;
            --text-primary: #ffffff;
            --text-secondary: #b0b0b0;
            --accent-color: #2db8e6;
            --accent-hover: #26a0d1;
            --card-border: rgba(255,255,255,0.1);
        }

        body {
            font-family: 'Nunito', sans-serif;
            background-color: var(--bg-primary);
            color: var(--text-primary);
            padding: 15px;
            transition: background-color 0.3s ease, color 0.3s ease;
        }

        .topic-card {
            border: 1px solid var(--card-border);
            border-radius: 15px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.05);
            border-left: 6px solid var(--accent-color);
            background-color: var(--bg-secondary);
            color: var(--text-primary);
        }

        .topic-btn {
            background-color: var(--accent-color);
            color: white;
            border-radius: 25px;
            font-weight: 700;
            padding: 10px 25px;
            border: none;
            width: 100%;
        }

        .topic-btn:hover {
            background-color: var(--accent-hover);
        }
    </style>
</head>
<body>
    <div class="container mx-auto" style="max-width: 600px; padding-bottom: 40px;">
        <div class="text-center py-4">
            <h1 class="fw-bold" style="color: var(--accent-color);">Chemia</h1>
            <p class="text-body-secondary mb-4">Wybierz dział, aby rozpocząć test.</p>
        </div>

        <div class="card topic-card mb-4">
            <div class="card-body p-4">
                <h4 class="fw-bold mb-2">Kwasy Beztlenowe</h4>
                <p class="text-body-secondary mb-4">Przejdź do zestawu pytań o kwasach beztlenowych.</p>
                <button class="topic-btn" data-route="chemistry/hydroacids" data-src="chemistry/hydroacids.html">Otwórz</button>
            </div>
        </div>

        <div class="card topic-card mb-4">
            <div class="card-body p-4">
                <h4 class="fw-bold mb-2">Kwasy Tlenowe</h4>
                <p class="text-body-secondary mb-4">Przejdź do zestawu pytań o kwasach tlenowych.</p>
                <button class="topic-btn" data-route="chemistry/oxyacids" data-src="chemistry/oxyacids.html">Otwórz</button>
            </div>
        </div>

        <div class="card topic-card mb-4">
            <div class="card-body p-4">
                <h4 class="fw-bold mb-2">Kwasy</h4>
                <p class="text-body-secondary mb-4">Przejdź do podstrony ogólnej o kwasach.</p>
                <button class="topic-btn" data-route="chemistry/acids" data-src="chemistry/acids.html">Otwórz</button>
            </div>
        </div>
    </div>

    <script>
        function navigateTo(route, src) {
            const isEmbedded = window.parent && window.parent !== window;
            const parentFrame = isEmbedded ? window.parent.document.getElementById('content-frame') : null;

            if (parentFrame) {
                window.parent.history.pushState({ route }, '', `#!/${route}`);
                parentFrame.src = src;
                return;
            }

            window.location.href = src.split('/').pop();
        }

        document.querySelectorAll('.topic-btn').forEach((button) => {
            button.addEventListener('click', () => {
                const route = button.getAttribute('data-route');
                const src = button.getAttribute('data-src');
                navigateTo(route, src);
            });
        });
    </script>
</body>
</html>
